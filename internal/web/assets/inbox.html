{{define "inbox.html"}}
<!doctype html>
<html>
<head><title>ov2 — Inbox</title><script src="/assets/htmx.min.js"></script></head>
<body>
<h1>Inbox</h1>
<p><a href="/capture">Capture a note</a></p>
{{if .Notes}}
<ul>
{{range .Notes}}<li>{{.Name}} — {{.Age}}d old {{template "triage-button.html" .}}</li>{{end}}
</ul>
{{else}}
<p>Inbox is empty.</p>
{{end}}
</body>
</html>
{{end}}
